<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PhysioOnClick — Expert physiotherapy, one tap away.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PhysioOnClick">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>PhysioOnClick</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(160deg, #0E7490 0%, #0891B2 45%, #164E63 100%);
      min-height: 100vh;
      overflow: hidden;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      background: linear-gradient(160deg, #0E7490 0%, #0891B2 45%, #164E63 100%);
      transition: opacity 0.4s ease;
      z-index: 9999;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 64px;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      animation: pulse-icon 2s ease-in-out infinite;
    }

    .logo-icon svg {
      width: 44px;
      height: 44px;
    }

    .logo-name {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.5px;
    }

    .logo-tagline {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      margin-top: -12px;
      letter-spacing: 0.2px;
    }

    .dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      animation: bounce 1.4s ease-in-out infinite;
    }

    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1.1); opacity: 1; }
    }

    @keyframes pulse-icon {
      0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); }
      50% { transform: scale(1.04); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo-wrap">
      <div class="logo-icon">
        <!-- Shield + cross SVG -->
        <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22 4L8 9.5V21C8 29.5 14.2 37.4 22 40C29.8 37.4 36 29.5 36 21V9.5L22 4Z"
            fill="white" fill-opacity="0.9"/>
          <path d="M22 14V30M15 22H29" stroke="#0891B2" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="logo-name">PhysioOnClick</div>
        <div class="logo-tagline">Expert physio, one tap away</div>
      </div>
    </div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    // Hide loading screen when Flutter renders its first frame
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) {
        el.classList.add('hidden');
        setTimeout(function () { el.remove(); }, 450);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
